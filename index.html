// ===== Practice Bank (NBCRNA Blueprint-organized practice questions) =====
function PracticeBank({ onPickDeck }) {
  const practice = window.PRACTICE_QUESTIONS || [];
  const cats = window.NBCRNA_CATEGORIES;
  // Group by NBCRNA category
  const decks = useMemo(() => {
    const m = new Map();
    for (const q of practice) {
      const cat = q.category || "GP";
      if (!m.has(cat)) m.set(cat, []);
      m.get(cat).push(q);
    }
    return Array.from(m.entries()).map(([code, qs]) => ({
      code, info: cats[code], qs,
    })).sort((a, b) => Object.keys(cats).indexOf(a.code) - Object.keys(cats).indexOf(b.code));
  }, []);

  const handleOpen = (deck) => {
    onPickDeck({
      year: "練習",
      specialty: "anesth_practice",
      specName: deck.info.name,
      className: "spec-anesth",
      short: "練",
      qs: deck.qs,
    });
  };

  // Sub-category breakdown
  const subCats = (qs) => {
    const m = new Map();
    for (const q of qs) {
      const s = q.subcategory || "其他";
      m.set(s, (m.get(s) || 0) + 1);
    }
    return Array.from(m.entries()).sort((a,b) => b[1] - a[1]);
  };

  return (
    <div className="fade-in">
      <div className="page-head">
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
            <div style={{ width: 36, height: 36, borderRadius: 9, background: "var(--accent-soft)", color: "var(--accent-deep)", display: "grid", placeItems: "center" }}>
              <MedIcon name="lightbulb" size={18}/>
            </div>
            <h1 className="page-title" style={{ margin: 0 }}>參考書練習題庫</h1>
          </div>
          <p className="page-sub">依 NBCRNA Blueprint 結構，採用衛福部麻醉專師甄審筆試出題格式　·　共 {practice.length} 題 / {decks.length} 組</p>
        </div>
      </div>

      <div className="panel" style={{ marginBottom: 16, padding: 18 }}>
        <div style={{ fontSize: 12, color: "var(--ink-3)", letterSpacing: "0.06em", marginBottom: 6 }}>命題依據</div>
        <div style={{ fontSize: 13.5, color: "var(--ink-2)", lineHeight: 1.7 }}>
          題目內容萃取自 <strong style={{color:"var(--ink-1)"}}>Miller's Anesthesia</strong>、<strong style={{color:"var(--ink-1)"}}>Barash Clinical Anesthesia</strong>、<strong style={{color:"var(--ink-1)"}}>Nagelhout Nurse Anesthesia</strong>、<strong style={{color:"var(--ink-1)"}}>Stoelting's Co-existing Disease</strong>、<strong style={{color:"var(--ink-1)"}}>MGH 臨床麻醉手冊</strong>、<strong style={{color:"var(--ink-1)"}}>Hagberg Airway Management</strong>、<strong style={{color:"var(--ink-1)"}}>Chestnut's Obstetric Anesthesia</strong>、<strong style={{color:"var(--ink-1)"}}>Pocket Anesthesia</strong> 等 NBCRNA 建議參考書。
          每題附有題解、重點整理、關鍵字與來源章節。
        </div>
      </div>

      <div className="card-grid" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(360px, 1fr))" }}>
        {decks.map(d => (
          <div key={d.code} className="deck-card spec-anesth" onClick={() => handleOpen(d)} style={{ cursor: "pointer" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div style={{ width: 44, height: 44, borderRadius: 10, background: "color-mix(in oklch, var(--accent) 18%, transparent)", color: "var(--accent)", display: "grid", placeItems: "center", fontWeight: 800, fontSize: 15, fontFamily: "var(--font-mono)" }}>{d.code}</div>
              <span className="deck-year" style={{ background: "color-mix(in oklch, var(--accent) 12%, transparent)", color: "var(--accent)" }}>{d.info.pct}% 占比</span>
            </div>
            <div className="deck-title" style={{ marginTop: 14 }}>{d.info.name}</div>
            <div style={{ fontSize: 11, color: "var(--ink-3)", marginTop: 2, fontFamily: "var(--font-mono)", letterSpacing: "0.02em" }}>{d.info.en}</div>
            <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px dashed var(--surface-alt)" }}>
              <div style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 6 }}>涵蓋主題</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {subCats(d.qs).slice(0, 5).map(([s, c]) => (
                  <span key={s} style={{ fontSize: 11, padding: "3px 8px", borderRadius: 99, background: "var(--surface-alt)", color: "var(--ink-2)", fontWeight: 500 }}>{s}<span style={{ color: "var(--ink-3)", marginLeft: 4 }}>×{c}</span></span>
                ))}
                {subCats(d.qs).length > 5 && <span style={{ fontSize: 11, color: "var(--ink-3)", padding: "3px 6px" }}>+{subCats(d.qs).length - 5} 更多</span>}
              </div>
            </div>
            <div className="deck-meta" style={{ marginTop: 14 }}>
              <span className="deck-count"><strong>{d.qs.length}</strong> 題</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: "var(--ink-3)" }}><path d="m9 18 6-6-6-6"/></svg>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===== Admin Panel (only visible to ADMIN_EMAIL) =====
function AdminPanel() {
  const [users, setUsers] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [filter, setFilter] = useState("all"); // all | active | disabled
  const [query, setQuery] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  useEffect(() => {
    const unsub = window.AdminAPI.subscribeUsers((list) => { setUsers(list); setLoaded(true); });
    return () => { if (typeof unsub === "function") unsub(); };
  }, []);
  const stats = useMemo(() => ({
    total: users.length,
    active: users.filter(u => u.status === "active").length,
    disabled: users.filter(u => u.status === "disabled").length,
  }), [users]);
  const filtered = users.filter(u => {
    if (filter !== "all" && u.status !== filter) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!(u.name||"").toLowerCase().includes(q)
       && !(u.email||"").toLowerCase().includes(q)
       && !(u.hospital||"").toLowerCase().includes(q)) return false;
    }
    return true;
  });
  const fmtDate = (ts) => {
    if (!ts) return "—";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.getFullYear() + "/" + String(d.getMonth()+1).padStart(2,'0') + "/" + String(d.getDate()).padStart(2,'0') + " " + String(d.getHours()).padStart(2,'0') + ":" + String(d.getMinutes()).padStart(2,'0');
  };
  const toggleStatus = async (u) => {
    const newStatus = u.status === "active" ? "disabled" : "active";
    try { await window.AdminAPI.setStatus(u.uid, newStatus); }
    catch (e) { alert("更新失敗：" + e.message); }
  };
  const handleDelete = async (u) => {
    try { await window.AdminAPI.deleteProfile(u.uid); setConfirmDelete(null); }
    catch (e) { alert("刪除失敗：" + e.message); }
  };
  return (
    <div className="fade-in">
      <div className="page-head">
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
            <div style={{ width: 36, height: 36, borderRadius: 9, background: "color-mix(in oklch, oklch(0.60 0.20 25) 18%, transparent)", color: "oklch(0.75 0.20 25)", display: "grid", placeItems: "center" }}>
              <MedIcon name="shield" size={18}/>
            </div>
            <h1 className="page-title" style={{ margin: 0 }}>使用者管理</h1>
          </div>
          <p className="page-sub">管理員專屬頁面 · 註冊使用者清單 · {stats.total} 人（啟用 {stats.active}、停用 {stats.disabled}）</p>
        </div>
      </div>
      <div className="kpi-row" style={{ marginBottom: 16 }}>
        <div className="kpi-card"><div className="kpi-label">總註冊人數</div><div className="kpi-value">{stats.total}<span className="kpi-unit">人</span></div></div>
        <div className="kpi-card"><div className="kpi-label">啟用中</div><div className="kpi-value" style={{ color: "oklch(0.78 0.18 150)" }}>{stats.active}<span className="kpi-unit">人</span></div></div>
        <div className="kpi-card"><div className="kpi-label">已停用</div><div className="kpi-value" style={{ color: "oklch(0.75 0.20 25)" }}>{stats.disabled}<span className="kpi-unit">人</span></div></div>
        <div className="kpi-card"><div className="kpi-label">啟用率</div><div className="kpi-value">{stats.total ? Math.round(stats.active/stats.total*100) : 0}<span className="kpi-unit">%</span></div></div>
      </div>
      <input className="search-input" placeholder="搜尋姓名 / Email / 醫院" value={query} onChange={e => setQuery(e.target.value)} style={{ marginBottom: 12 }} />
      <div className="filters" style={{ marginBottom: 16 }}>
        <div className="filter-group">
          <span className="filter-label">狀態</span>
          <div className="filter-chips">
            <button className={"chip " + (filter === "all" ? "active" : "")} onClick={() => setFilter("all")}>全部 ({stats.total})</button>
            <button className={"chip " + (filter === "active" ? "active" : "")} onClick={() => setFilter("active")}>啟用中 ({stats.active})</button>
            <button className={"chip " + (filter === "disabled" ? "active" : "")} onClick={() => setFilter("disabled")}>已停用 ({stats.disabled})</button>
          </div>
        </div>
      </div>
      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        {!loaded ? (
          <div style={{ padding: 40, textAlign: "center", color: "var(--ink-3)" }}>載入中…</div>
        ) : filtered.length === 0 ? (
          <div style={{ padding: 40, textAlign: "center", color: "var(--ink-3)" }}>沒有符合條件的使用者</div>
        ) : (
          <table className="admin-table">
            <thead>
              <tr>
                <th>使用者</th>
                <th>身分</th>
                <th>單位</th>
                <th>註冊時間</th>
                <th>最後登入</th>
                <th>狀態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(u => (
                <tr key={u.uid}>
                  <td>
                    <div style={{ fontWeight: 600, color: "var(--ink-1)" }}>{u.name || "—"}</div>
                    <div style={{ fontSize: 12, color: "var(--ink-3)", fontFamily: "var(--font-mono)" }}>{u.email}</div>
                  </td>
                  <td><span style={{ fontSize: 12, color: "var(--ink-2)" }}>{u.role === "certified" ? "已甄審 NP" : u.role === "other" ? "其他" : "訓練中 NP"}</span><div style={{ fontSize: 11, color: "var(--ink-3)" }}>{u.experience || "—"} 年資</div></td>
                  <td><span style={{ fontSize: 13, color: "var(--ink-2)" }}>{u.hospital || "—"}</span></td>
                  <td><span style={{ fontSize: 12, color: "var(--ink-3)", fontFamily: "var(--font-mono)" }}>{fmtDate(u.createdAt)}</span></td>
                  <td><span style={{ fontSize: 12, color: "var(--ink-3)", fontFamily: "var(--font-mono)" }}>{fmtDate(u.lastLoginAt)}</span></td>
                  <td>
                    {u.status === "active"
                      ? <span className="status-badge status-active">● 啟用中</span>
                      : <span className="status-badge status-disabled">● 已停用</span>}
                  </td>
                  <td>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button className="admin-action" onClick={() => toggleStatus(u)} title={u.status === "active" ? "停用此帳號" : "重新啟用"}>
                        {u.status === "active" ? "停用" : "啟用"}
                      </button>
                      <button className="admin-action danger" onClick={() => setConfirmDelete(u)} title="刪除帳號資料">刪除</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      <p style={{ fontSize: 12, color: "var(--ink-3)", marginTop: 14, lineHeight: 1.7 }}>
        ※ 「停用」只是阻止登入；資料仍保留。<br/>
        ※ 「刪除」僅刪除 Firestore 使用者資料，Firebase Authentication 中的帳號需到 Firebase Console 刪除。<br/>
        ※ 您（{window.ADMIN_EMAIL}）為唯一管理員。
      </p>
      {confirmDelete && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "grid", placeItems: "center", zIndex: 9999 }} onClick={() => setConfirmDelete(null)}>
          <div className="card" style={{ padding: 24, maxWidth: 420 }} onClick={e => e.stopPropagation()}>
            <h3 style={{ margin: "0 0 12px", fontSize: 17 }}>確認刪除使用者資料？</h3>
            <p style={{ color: "var(--ink-2)", fontSize: 14, lineHeight: 1.7 }}>將刪除 <strong>{confirmDelete.name}</strong>（{confirmDelete.email}）的 Firestore 資料。<br/>此操作不可復原，且該使用者下次登入時會被視為「使用者資料不存在」。</p>
            <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
              <button className="admin-action" onClick={() => setConfirmDelete(null)} style={{ flex: 1 }}>取消</button>
              <button className="admin-action danger" onClick={() => handleDelete(confirmDelete)} style={{ flex: 1 }}>確認刪除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== Main App =====
function App() {
  const [page, setPage] = useState("home");
  const [activeDeck, setActiveDeck] = useState(null);
  const [user, setUser] = useState(() => window.AuthAPI.current());
  const [authReady, setAuthReady] = useState(() => window.AuthAPI.current() !== null);
  const [menuOpen, setMenuOpen] = useState(false);
  const allDecks = useMemo(() => { const map = new Map(); for (const q of window.QUESTIONS) { const key = q.year + "::" + q.specialty; if (!map.has(key)) map.set(key, true); } return map.size; }, []);
  const handlePickDeck = (deck) => setActiveDeck(deck);
  const handleExitDeck = () => setActiveDeck(null);
  const handleLogout = async () => { try { await window.AuthAPI.logout(); } catch(e) {} setMenuOpen(false); setActiveDeck(null); setPage("home"); };
  useEffect(() => {
    // Subscribe to Firebase auth state changes
    const unsub = window.AuthAPI.subscribe((profile) => {
      setUser(profile);
      setAuthReady(true);
    });
    // Give Firebase a chance to restore session, then mark ready
    const timer = setTimeout(() => setAuthReady(true), 1500);
    return () => { unsub(); clearTimeout(timer); };
  }, []);
  useEffect(() => { if (!menuOpen) return; const onClick = (e) => { if (!e.target.closest(".user-menu")) setMenuOpen(false); }; document.addEventListener("click", onClick); return () => document.removeEventListener("click", onClick); }, [menuOpen]);
  if (!authReady) return (
    <div style={{position:"fixed",inset:0,display:"grid",placeItems:"center",background:"var(--bg)",color:"var(--ink-1)"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:48,height:48,border:"3px solid var(--surface-alt)",borderTopColor:"var(--accent)",borderRadius:"50%",margin:"0 auto 16px",animation:"spin 0.8s linear infinite"}}></div>
        <div style={{fontSize:14,color:"var(--ink-2)",letterSpacing:"0.06em"}}>檢查登入狀態…</div>
      </div>
    </div>
  );
  if (!user) return <AuthScreen />;
  if (user.needsProfile) return <ProfileCompletion user={user} />;
  let content;
  if (activeDeck) content = <Flashcard deck={activeDeck} onExit={handleExitDeck} />;
  else if (page === "home") content = <Home onNav={setPage} onPickDeck={handlePickDeck} />;
  else if (page === "decks") content = <DeckList onPickDeck={handlePickDeck} />;
  else if (page === "practice") content = <PracticeBank onPickDeck={handlePickDeck} />;
  else if (page === "review") content = <ReviewToday onPickDeck={handlePickDeck} />;
  else if (page === "dashboard") content = <Dashboard />;
  else if (page === "syllabus") content = <Syllabus />;
  else if (page === "about") content = <About />;
  else if (page === "admin" && user.isAdmin) content = <AdminPanel />;
  const initials = (user.name || "U").trim().slice(0, 2).toUpperCase();
  const roleLabel = user.isAdmin ? "管理員" : user.role === "certified" ? "已甄審 NP" : user.role === "other" ? "其他" : "訓練中 NP";
  return (
    <div className="app">
      <Sidebar currentPage={page} onNav={(p) => { setActiveDeck(null); setPage(p); }} decks={allDecks} isAdmin={user.isAdmin} />
      <header className="topbar">
        <div className="topbar-left">
          <MedIcon name="pulse" size={16}/><span style={{ color: "var(--ink-3)" }}>Anesthesia NP Prep Platform</span>
          <span style={{ width: 1, height: 14, background: "var(--border)" }}></span>
          <span style={{ color: "var(--ink-2)", fontWeight: 500 }}>{activeDeck ? "閃卡複習" : page === "home" ? "總覽" : page === "decks" ? "考古題卡組" : page === "practice" ? "參考書練習題" : page === "review" ? "今日複習" : page === "dashboard" ? "甄審通過率儀表板" : page === "syllabus" ? "命題大綱" : page === "admin" ? "使用者管理" : "關於本站"}</span>
        </div>
        <div className="topbar-right">
          <div className="topbar-time"><MedIcon name="calendar" size={13}/><span>114 年度</span></div>
          <div className="topbar-author">
            <div className="topbar-author-avatar"><MedIcon name="stethoscope" size={16}/></div>
            <div className="topbar-author-text">
              <div className="topbar-author-label">SITE AUTHOR</div>
              <div className="topbar-author-name">張家豪 醫師<span className="sep-dot"></span><span className="topbar-author-affil">新竹台大分院 急診醫學部</span></div>
              <div className="topbar-author-contact"><a href="mailto:g56017@hch.gov.tw" className="contact-chip" title="Email"><MedIcon name="mail" size={11}/><span>g56017@hch.gov.tw</span></a></div>
            </div>
          </div>
          <div className="user-menu">
            <button className="user-chip" onClick={(e) => { e.stopPropagation(); setMenuOpen(o => !o); }}>
              <div className="user-avatar">{initials}</div>
              <div className="user-chip-text"><div className="user-chip-name">{user.name}</div><div className="user-chip-role">{roleLabel}</div></div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: "var(--ink-3)" }}><path d="m6 9 6 6 6-6"/></svg>
            </button>
            {menuOpen && (
              <div className="user-pop">
                <div className="user-pop-head"><div className="user-pop-name">{user.name}</div><div className="user-pop-mail">{user.email}</div></div>
                <button className="user-pop-item" onClick={() => { setPage("about"); setMenuOpen(false); }}><MedIcon name="info" size={15}/>關於本站</button>
                <button className="user-pop-item danger" onClick={handleLogout}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>登出</button>
              </div>
            )}
          </div>
        </div>
      </header>
      <main className="main">{content}</main>
    </div>
  );
}

// Load questions from external JSON before rendering
function Loading() {
  return (
    <div style={{position:"fixed",inset:0,display:"grid",placeItems:"center",background:"var(--bg)",color:"var(--ink-1)"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:48,height:48,border:"3px solid var(--surface-alt)",borderTopColor:"var(--accent)",borderRadius:"50%",margin:"0 auto 16px",animation:"spin 0.8s linear infinite"}}></div>
        <div style={{fontSize:14,color:"var(--ink-2)",letterSpacing:"0.06em"}}>載入題庫中…</div>
        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      </div>
    </div>
  );
}

const rootEl = ReactDOM.createRoot(document.getElementById("root"));
rootEl.render(<Loading />);

Promise.all([
  fetch("questions.json").then(r => r.json()).catch(() => []),
  fetch("practice_questions.json").then(r => r.json()).catch(() => []),
]).then(([official, practice]) => {
  window.QUESTIONS = [...official, ...practice];
  window.PRACTICE_QUESTIONS = practice;
  rootEl.render(<App />);
}).catch(err => {
  console.error("Failed to load question banks", err);
  window.QUESTIONS = [];
  window.PRACTICE_QUESTIONS = [];
  rootEl.render(<App />);
});
  </script>
</body>
